name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Validate JavaScript syntax
        run: |
          node --check analytics.js
          node --check base-script.js
          node --check journeys.js
          node --check script.js
          node --check api/beta-signup.js
          node --check api/admin-signups.js
      - name: Verify required launch files
        run: |
          test -f index.html
          test -f apply.html
          test -f businesses.html
          test -f impact-passport.html
          test -f thank-you.html
          test -f vercel.json
          test -f .env.example
          test -f docs/ROLLBACK.md
