<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>UNIGO Admin</title><link rel='stylesheet' href='styles.css'></head><body><main class='section'><p class='eyebrow'>UNIGO Admin</p><h1>Beta Signups Dashboard</h1><p>Private dashboard for reviewing travelers, businesses, facilitators and community partners.</p><div id='login'><input id='token' type='password' placeholder='Admin token'><button class='btn primary' id='load'>Load Signups</button></div><div id='stats' class='cards three'></div><div id='results'></div></main><script>document.getElementById('load').onclick=async()=>{const token=document.getElementById('token').value;const r=await fetch('/api/admin-signups',{headers:{Authorization:'Bearer '+token}});const data=await r.json();if(!r.ok){alert(data.error||'Failed');return;}document.getElementById('stats').innerHTML=`<article><h3>${data.totals.total}</h3><p>Total</p></article><article><h3>${data.totals.traveler}</h3><p>Travelers</p></article><article><h3>${data.totals.business}</h3><p>Businesses</p></article>`;document.getElementById('results').innerHTML='<pre style="white-space:pre-wrap">'+JSON.stringify(data.signups,null,2)+'</pre>';};</script><script src='admin-tools.js'></script></body></html>
